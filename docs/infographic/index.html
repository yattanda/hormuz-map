  <!-- zoom-block modal: 1枚目左右拡大 -->
  <div class="zoom-block-modal" id="zoomBlockModal" aria-hidden="true">
    <div class="zoom-block-backdrop" data-zoom-close></div>
    <div class="zoom-block-dialog" role="dialog" aria-modal="true" aria-labelledby="zoomBlockTitle">
      <div class="zoom-block-header">

        <button type="button" class="zoom-block-close" data-zoom-close aria-label="拡大表示を閉じる">×</button>
      </div>
      <div class="zoom-block-scroll">

  <script>
    (() => {
      const modal = document.getElementById('zoomBlockModal');
      const crop = document.getElementById('zoomBlockCrop');
      const title = document.getElementById('zoomBlockTitle');
      const zoomImage = document.getElementById('zoomBlockImage');
      const buttons = document.querySelectorAll('.zoom-block-btn');
      const closeButtons = document.querySelectorAll('[data-zoom-close]');

      if (!modal || !crop || !title || !buttons.length) return;

      let lastFocused = null;

      const openModal = (button) => {
        const side = button.dataset.zoomSide || 'left';
        const split = button.dataset.zoomSplit || '58-42';
        const imgSrc = button.dataset.zoomImg;
        const modalTitle = button.dataset.zoomTitle || '拡大表示';

        lastFocused = document.activeElement;

        crop.classList.remove('is-left', 'is-center', 'is-right', 'split-58-42', 'split-57-43', 'split-56-44', 'split-50-50', 'split-35-30-35', 'split-36-28-36', 'split-36-26-38', 'split-38-21-41', 'split-38-20-42');
        if (side === 'center') {
          crop.classList.add('is-center');
        } else if (side === 'right') {
          crop.classList.add('is-right');
        } else {
          crop.classList.add('is-left');
        }
        crop.classList.add(`split-${split}`);

        if (zoomImage && imgSrc) zoomImage.src = imgSrc;
        title.textContent = modalTitle;

        const inset = button.dataset.zoomInset || '0';
        crop.style.padding = `0 ${inset}`;

        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';

        const closeBtn = modal.querySelector('.zoom-block-close');
        if (closeBtn) closeBtn.focus();
        const scrollArea = modal.querySelector('.zoom-block-scroll');
        if (scrollArea) scrollArea.scrollTop = 0;
      };

      const closeModal = () => {
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        crop.style.padding = '';
        if (lastFocused && typeof lastFocused.focus === 'function') {
          lastFocused.focus();
        }
      };

      buttons.forEach((button) => {
        button.addEventListener('click', () => openModal(button));
      });

      closeButtons.forEach((button) => {
        button.addEventListener('click', closeModal);
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && modal.getAttribute('aria-hidden') === 'false') {
          closeModal();
        }
      });
    })();
  </script>
