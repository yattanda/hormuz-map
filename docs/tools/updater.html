<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hormuz更新">
<title>🛢️ Hormuz Map 更新ツール</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #222536;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --ok: #4ade80; --err: #f87171; --warn: #fbbf24; --info: #60a5fa;
    --accent: #6366f1; --accent2: #818cf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100dvh;
    padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0)
             env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
  }
  .app { max-width: 480px; margin: 0 auto; padding: 1rem 1rem 4rem; }

  .header { display:flex; align-items:center; gap:10px; padding:1rem 0 1.25rem;
    border-bottom:0.5px solid var(--border); margin-bottom:1.25rem; }
  .header-icon { width:36px; height:36px; border-radius:10px;
    background:linear-gradient(135deg,#6366f1,#818cf8);
    display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .header h1 { font-size:15px; font-weight:600; letter-spacing:-0.01em; }
  .header p  { font-size:11px; color:var(--text2); margin-top:2px; }

  .field { margin-bottom:1rem; }
  .field label { display:block; font-size:11px; font-weight:500; color:var(--text2);
    letter-spacing:0.04em; text-transform:uppercase; margin-bottom:6px; }
  input[type=text], input[type=password], textarea {
    width:100%; background:var(--bg2); border:0.5px solid var(--border2);
    border-radius:10px; color:var(--text);
    font-family:'SF Mono','Menlo',monospace; font-size:12px;
    padding:10px 12px; outline:none; -webkit-appearance:none; transition:border-color 0.15s;
  }
  input:focus, textarea:focus { border-color:var(--accent2); }
  textarea { min-height:150px; resize:vertical; line-height:1.6; }
  ::placeholder { color:var(--text3); }

  .commit-row { display:flex; gap:8px; align-items:stretch; }
  .commit-row input { flex:1; }
  .today-btn { background:var(--bg3); border:0.5px solid var(--border2);
    border-radius:10px; color:var(--text2); font-size:11px;
    padding:0 12px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
  .today-btn:active { opacity:0.7; }

  .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:1.25rem 0; }
  .btn { border-radius:10px; border:0.5px solid var(--border2);
    background:var(--bg2); color:var(--text); font-size:13px; font-weight:500;
    padding:11px 8px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:5px;
    -webkit-tap-highlight-color:transparent; transition:opacity 0.15s,transform 0.1s; }
  .btn:active { transform:scale(0.97); opacity:0.8; }
  .btn:disabled { opacity:0.3; cursor:not-allowed; }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.primary:active { background:#4f46e5; }

  /* ファイル別ステータス */
  .file-stats { margin-bottom:1rem; }
  .file-stat-row { background:var(--bg2); border:0.5px solid var(--border);
    border-radius:10px; padding:10px 12px; margin-bottom:6px; }
  .file-stat-row .fname { font-size:11px; color:var(--text2); margin-bottom:6px;
    font-family:'SF Mono','Menlo',monospace; }
  .mini-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; }
  .mini-stat { background:var(--bg3); border-radius:6px; padding:5px 4px; text-align:center; }
  .mini-stat .num { font-size:16px; font-weight:600; }
  .mini-stat .lbl { font-size:9px; color:var(--text2); margin-top:1px; }
  .mini-stat.ok .num  { color:var(--ok); }
  .mini-stat.skip .num{ color:var(--warn); }
  .mini-stat.err .num { color:var(--err); }

  .log-label { font-size:11px; color:var(--text3); margin-bottom:6px;
    letter-spacing:0.03em; text-transform:uppercase;
    display:flex; align-items:center; justify-content:space-between; }
  .log { background:var(--bg2); border:0.5px solid var(--border); border-radius:10px;
    padding:12px; font-family:'SF Mono','Menlo',monospace; font-size:11px; line-height:1.8;
    min-height:100px; max-height:300px; overflow-y:auto;
    white-space:pre-wrap; word-break:break-all; color:var(--text2);
    -webkit-overflow-scrolling:touch; }
  .ok   { color:var(--ok); }
  .err  { color:var(--err); }
  .warn { color:var(--warn); }
  .info { color:var(--info); }

  .copy-btn { background:var(--bg3); border:0.5px solid var(--border2);
    border-radius:6px; color:var(--text2); font-size:11px; padding:3px 10px; cursor:pointer; }
  .copy-btn:active { opacity:0.6; }
  .hint { font-size:10px; color:var(--text3); margin-top:5px; line-height:1.5; }
  .footer { font-size:10px; color:var(--text3); text-align:center; margin-top:2rem; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-icon">🛢️</div>
    <div>
      <h1>Hormuz Map 更新ツール</h1>
      <p>diffs.md → GitHub API → index.html / news_data.json 自動適用</p>
    </div>
  </div>

  <div class="field">
    <label>GitHub Token</label>
    <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
    <p class="hint">※ 入力値はこのページ内にのみ存在します。外部送信・保存はしません。</p>
  </div>

  <div class="field">
    <label>diffs.md の内容</label>
    <textarea id="diffs" placeholder="Claude.ai が生成した diffs.md の全文を貼り付け

（<!-- APPLY:START --> ブロックを含む内容）
（news_data.json の変更は <!-- FILE:docs/data/news_data.json --> で自動認識）"></textarea>
  </div>

  <div class="field">
    <label>コミットメッセージ</label>
    <div class="commit-row">
      <input type="text" id="commitmsg" value="update: mobile update via Claude.ai">
      <button class="today-btn" onclick="setTodayMsg()">今日の日付</button>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="parseOnly()">🔍 パース確認</button>
    <button class="btn primary" id="pushBtn" onclick="runApply()">📤 適用 &amp; Push</button>
  </div>

  <div class="file-stats" id="fileStats" style="display:none"></div>

  <div class="log-label">
    <span>ログ</span>
    <button class="copy-btn" id="copyBtn" onclick="copyLog()">📋 コピー</button>
  </div>
  <div class="log" id="log">準備完了 — diffs.md を貼り付けて実行してください。</div>

  <div class="footer">
    yattanda/hormuz-map<br>
    対象: docs/index.html &amp; docs/data/news_data.json<br>
    Token はページを閉じると消去されます
  </div>

</div>
<script>
const OWNER = 'yattanda';
const REPO  = 'hormuz-map';
const DEFAULT_PATH = 'docs/index.html';

// APPLY ブロック正規表現（FILE: ディレクティブ対応）
const BLOCK_RE = /<!--\s*APPLY:START\s*-->\s*\n(?:<!--\s*FILE:(.*?)\s*-->\s*\n)?<!--\s*OLD:START\s*-->\n([\s\S]*?)\n?<!--\s*OLD:END\s*-->\s*\n<!--\s*NEW:START\s*-->\n([\s\S]*?)\n?<!--\s*NEW:END\s*-->\s*\n<!--\s*APPLY:END\s*-->/g;

function setTodayMsg() {
  const now = new Date();
  const y=now.getFullYear(), m=String(now.getMonth()+1).padStart(2,'0'),
        d=String(now.getDate()).padStart(2,'0'),
        hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('commitmsg').value = `update: ${y}-${m}-${d} ${hh}:${mm} mobile`;
}

function copyLog() {
  const text = document.getElementById('log').innerText;
  const btn = document.getElementById('copyBtn');
  const done = () => { btn.textContent='✅ コピー完了'; setTimeout(()=>btn.textContent='📋 コピー',2000); };
  navigator.clipboard ? navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done))
                      : fallback(text,done);
}
function fallback(text,cb) {
  const ta=document.createElement('textarea');
  ta.value=text; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta); cb();
}

function log(msg, cls='') {
  const el=document.getElementById('log');
  el.innerHTML += cls ? `<span class="${cls}">${esc(msg)}</span>\n` : esc(msg)+'\n';
  el.scrollTop=el.scrollHeight;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ブロックをファイルパス別にグループ化
function parseBlocks(text) {
  const groups = {}; // path -> [{old, new}]
  let m; BLOCK_RE.lastIndex=0;
  while ((m=BLOCK_RE.exec(text))!==null) {
    const path = (m[1]||DEFAULT_PATH).trim();
    if (!groups[path]) groups[path]=[];
    groups[path].push({ old:m[2].trim(), new:m[3].trim() });
  }
  return groups;
}

function parseOnly() {
  document.getElementById('log').textContent='';
  document.getElementById('fileStats').style.display='none';
  const groups = parseBlocks(document.getElementById('diffs').value);
  const paths = Object.keys(groups);
  if (!paths.length) {
    log('⚠️  APPLY ブロックが見つかりません。\n    <!-- APPLY:START/END --> 形式で囲まれているか確認。','warn');
    return;
  }
  paths.forEach(path => {
    const pairs=groups[path];
    log(`📁 ${path} — ${pairs.length}件`, 'info');
    pairs.forEach((p,i)=>log(`  #${i+1} old: ${p.old.substring(0,55).replace(/\n/g,'↵')}…`));
  });
  log(`\n✅ パース完了 — 「適用 & Push」で送信できます。`,'ok');
}

async function fetchFile(token, path) {
  const res = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,
    { headers:{ Authorization:`Bearer ${token}`, Accept:'application/vnd.github+json' } }
  );
  if (!res.ok) { const e=await res.json(); throw new Error(`取得失敗(${res.status}): ${e.message}`); }
  const data = await res.json();
  return { sha:data.sha, content:decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))) };
}

async function pushFile(token, path, content, sha, msg) {
  const res = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,
    {
      method:'PUT',
      headers:{ Authorization:`Bearer ${token}`, Accept:'application/vnd.github+json', 'Content-Type':'application/json' },
      body:JSON.stringify({ message:msg, content:btoa(unescape(encodeURIComponent(content))), sha })
    }
  );
  if (!res.ok) { const e=await res.json(); throw new Error(`Push失敗(${res.status}): ${e.message}`); }
  return await res.json();
}

function renderFileStats(results) {
  const el=document.getElementById('fileStats');
  el.innerHTML='';
  results.forEach(r=>{
    el.innerHTML+=`
      <div class="file-stat-row">
        <div class="fname">📁 ${r.path}</div>
        <div class="mini-stats">
          <div class="mini-stat ok"> <div class="num">${r.ok}</div>  <div class="lbl">適用済</div></div>
          <div class="mini-stat skip"><div class="num">${r.skip}</div><div class="lbl">スキップ</div></div>
          <div class="mini-stat err"> <div class="num">${r.err}</div>  <div class="lbl">エラー</div></div>
        </div>
      </div>`;
  });
  el.style.display='block';
}

async function runApply() {
  const token=document.getElementById('token').value.trim();
  const diffs=document.getElementById('diffs').value;
  const msg=document.getElementById('commitmsg').value.trim()||'update: mobile';
  document.getElementById('log').textContent='';
  document.getElementById('fileStats').style.display='none';

  if (!token){ log('❌ GitHub Token を入力してください。','err'); return; }
  if (!diffs) { log('❌ diffs.md の内容を貼り付けてください。','err'); return; }

  const groups=parseBlocks(diffs);
  const paths=Object.keys(groups);
  if (!paths.length){ log('⚠️  APPLY ブロックなし — 中止。','warn'); return; }

  log(`📦 対象ファイル: ${paths.length}件 (${paths.join(', ')})`,'info');

  const btn=document.getElementById('pushBtn');
  btn.disabled=true;

  const results=[];
  let totalOk=0;

  for (const path of paths) {
    const pairs=groups[path];
    log(`\n━━ ${path} (${pairs.length}件) ━━`,'info');

    try {
      log('🔄 取得中…','info');
      const { sha, content:orig } = await fetchFile(token, path);
      log(`✅ 取得完了 (${orig.length.toLocaleString()}文字, SHA:${sha.substring(0,7)})`,'ok');

      let text=orig, ok=0, skip=0, err=0;
      pairs.forEach((p,i)=>{
        const cnt=text.split(p.old).length-1;
        if      (cnt===0) { log(`❌ #${i+1}: 見つからない → ${p.old.substring(0,50).replace(/\n/g,'↵')}`,'err'); err++; }
        else if (cnt>1)   { log(`⚠️  #${i+1}: ${cnt}箇所マッチ(スキップ) → ${p.old.substring(0,50).replace(/\n/g,'↵')}`,'warn'); skip++; }
        else              { text=text.replace(p.old,p.new); log(`✅ #${i+1}: 適用完了`,'ok'); ok++; }
      });

      results.push({path,ok,skip,err});
      if (ok===0){ log(`⚠️  適用0件のため ${path} の Push をスキップ。`,'warn'); continue; }

      log(`\n📤 Push 中… (適用${ok} / スキップ${skip} / エラー${err})`,'info');
      const pd=await pushFile(token, path, text, sha, msg);
      log(`✅ Push 完了！ commit:${pd.commit.sha.substring(0,7)}`,'ok');
      totalOk+=ok;

    } catch(e) {
      log(`❌ ${path}: ${e.message}`,'err');
      results.push({path,ok:0,skip:0,err:pairs.length});
    }
  }

  renderFileStats(results);

  if (totalOk>0) {
    log(`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
    log(`✅ 全処理完了 — Pages 反映まで 1〜2分お待ちください。`,'ok');
    log(`⚠️  Claude.ai Project Knowledge「Sync now」を忘れずに！`,'warn');
  } else {
    log(`\n⚠️  全ファイル適用0件。Push はしていません。`,'warn');
  }

  btn.disabled=false;
}
</script>
</body>
</html>
