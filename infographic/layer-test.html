<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>レイヤーテスト（検証用）</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b1020;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(12px, 4vw, 40px);
      font-family: "Hiragino Sans", "Yu Gothic", "YuGothic", "Meiryo", sans-serif;
      color: #fff;
    }

    /*
     * ── 開発用メモ表示 ─────────────────────────
     * 本番移植時は .dev-note { display: none } の1行で非表示にする
     */
    .dev-note {
      width: 100%;
      max-width: 900px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #64748b;
      border-left: 3px solid #334155;
      padding-left: 12px;
      line-height: 1.6;
    }
    .dev-note strong { color: #94a3b8; }

    /* ── カード本体 ────────────────────────────── */
    .card {
      position: relative;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    /* ── 背景画像 ─────────────────────────────── */
    /*
     * blur(3px): 前回(5px)より緩め、背景の存在感を少し残す
     * brightness(0.52): 前回(0.4)より明るめ、テキスト可読性は維持
     * scale(1.06): blur端の白抜けを隠す最小スケール
     */
    .card__bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transform: scale(1.06);
      filter: blur(3px) brightness(0.52);
    }

    /* ── 全面カラーオーバーレイ ─────────────────── */
    /* 前回0.35 → 0.25 に緩和して背景を透かす */
    .card__overlay {
      position: absolute;
      inset: 0;
      background: rgba(7, 17, 31, 0.25);
    }

    /* ── テキストレイヤー ─────────────────────── */
    .card__layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      padding: clamp(12px, 3.5%, 40px);
    }

    /* ── テキストパネル ────────────────────────── */
    .card__panel {
      width: 100%;
      max-width: min(90%, 600px);
      background: rgba(7, 17, 31, 0.76);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: clamp(12px, 3%, 26px);
      display: flex;
      flex-direction: column;
      gap: clamp(7px, 1.3%, 13px);
    }

    /* ── バッジ ───────────────────────────────── */
    .badge {
      display: inline-block;
      padding: clamp(3px, 0.5%, 5px) clamp(8px, 1.4%, 13px);
      border-radius: 999px;
      background: #dc2626;
      font-size: clamp(10px, 1.3vw, 13px);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
      width: fit-content;
    }

    /* ── 見出し ───────────────────────────────── */
    /*
     * min 19px: スマホ(375px)で4.5vw=16.9pxを下回るため底上げ
     * max 36px: PCで大きすぎない上限
     * word-break: keep-all: 日本語の不自然な途中改行を防ぐ
     */
    .card__heading {
      font-size: clamp(19px, 4.5vw, 36px);
      font-weight: 900;
      line-height: 1.25;
      letter-spacing: 0.01em;
      color: #fff;
      word-break: keep-all;
      text-shadow:
        0 2px 16px rgba(0,0,0,0.95),
        0 1px 4px  rgba(0,0,0,0.85);
    }

    .card__heading span {
      color: #93c5fd;
    }

    /* ── 説明文 ───────────────────────────────── */
    /* <br> を除去しnatural wrapに委ねる */
    .card__desc {
      font-size: clamp(12px, 1.9vw, 16px);
      font-weight: 600;
      color: #cbd5e1;
      line-height: 1.65;
      text-shadow: 0 1px 8px rgba(0,0,0,0.85);
    }

    /* ── 注釈 ─────────────────────────────────── */
    .card__note {
      font-size: clamp(10px, 1.1vw, 12px);
      color: #64748b;
      letter-spacing: 0.03em;
      padding-top: clamp(4px, 0.8%, 8px);
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    /* ── 右上：バージョンバッジ ───────────────── */
    .card__top-right {
      position: absolute;
      top: clamp(10px, 2.5%, 22px);
      right: clamp(10px, 2.5%, 22px);
    }

    .update-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(15, 23, 42, 0.80);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 999px;
      padding: clamp(4px, 0.7%, 7px) clamp(10px, 1.8%, 16px);
      font-size: clamp(9px, 1.1vw, 12px);
      font-weight: 700;
      color: #93c5fd;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* ── PC専用調整 (min-width: 900px) ──────────── */
    @media (min-width: 900px) {
      /* 上部余白を詰める */
      body { padding-top: 16px; }

      /* dev-note の幅をカードに合わせる */
      .dev-note { max-width: 1160px; }

      /* カードを広げる・アスペクト比を横長に変更 */
      .card {
        max-width: 1160px;
        aspect-ratio: 16 / 9;
      }

      /* テキストレイヤーの余白を明示的に指定してパネルを左下へ */
      .card__layer {
        padding: 44px 52px;
      }

      /* パネル幅は固定して左端に寄せる */
      .card__panel {
        max-width: 540px;
      }
    }
  </style>
</head>
<body>

  <!-- 開発メモ：本番移植時は .dev-note { display: none } の1行で非表示 -->
  <p class="dev-note">
    <strong>検証用ページ（layer-test.html）</strong><br>
    既存画像を背景に、HTMLテキストをレイヤーで重ねる方式のテスト。
    既存の OGP / index.html は変更していません。
  </p>

  <div class="card">
    <!-- 背景画像：blur(3px)+brightness(0.52) で存在感を残しつつ文字競合を抑制 -->
    <img
      class="card__bg"
      src="../images/infographic-0420.png"
      alt=""
      aria-hidden="true"
    />

    <!-- 全面オーバーレイ -->
    <div class="card__overlay"></div>

    <!-- 右上：バージョンバッジ -->
    <div class="card__top-right">
      <span class="update-badge">📅 2026年5月版</span>
    </div>

    <!-- テキストレイヤー（左下） -->
    <div class="card__layer">
      <div class="card__panel">
        <div class="badge">🚨 警戒レベル：最高</div>
        <h2 class="card__heading">
          ホルムズ海峡<span>封鎖リスク</span>最前線
        </h2>
        <p class="card__desc">
          世界の原油輸送の約20%・LNGの約30%が通過するホルムズ海峡で、いま何が起きているのか。
        </p>
        <p class="card__note">📅 2026年5月2日更新</p>
      </div>
    </div>
  </div>

</body>

<!--
==========================================================
  index.html 冒頭ヒーロー移植メモ
==========================================================

  ✅ 移植可能な条件が揃っている：
  - .card は width:100%／max-width:900px／aspect-ratio 自己完結
  - フォントサイズは全て clamp() → 追加CSSなしでそのまま動く
  - 背景画像パスを ../images/ → images/ に変更するだけ
  - index.html の既存 <header> 直後か <main> 冒頭に .card ブロックを挿入

  ✅ 移植時に追加する1行：
  - .dev-note { display: none }  を index.html の <style> に追加

  ⚠️ 確認が必要な点：
  - index.html はカラム型レイアウトのため、カード横幅の max-width が
    既存の .container や .map-wrapper と競合しないか確認する
  - 背景画像を infographic-0420.png のまま使うか、別画像に差し替えるか判断が必要

  📌 移植手順（最小変更）:
  1. layer-test.html の <style> ブロック全体を index.html の </style> 直前にコピー
  2. .card〜</div> の HTML ブロックを index.html の <header> 直後に挿入
  3. img src を images/infographic-0420.png に修正
  4. .dev-note { display: none } を追加
==========================================================
-->
</html>
